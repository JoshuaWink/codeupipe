{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <!-- Agent navigation guide: https://codeuchain.github.io/codeupipe/agents.txt -->
  <meta name="agent-guide" content="https://codeuchain.github.io/codeupipe/agents.txt">
  {% if page and page.file %}
  <meta name="plain-text" content="https://codeuchain.github.io/codeupipe/{{ page.file.src_path | replace('.md', '.txt') }}">
  {% endif %}
  <style>
    /* ── Marketplace Hero Banner ───────────────────────────── */
    .marketplace-banner {
      position: relative;
      margin: 1.5em 0 2em;
      padding: 1.5em 2em;
      background: linear-gradient(135deg, rgba(124,77,255,0.12) 0%, rgba(255,171,0,0.10) 100%);
      border: 1px solid rgba(124,77,255,0.30);
      border-radius: 12px;
      overflow: hidden;
    }
    .marketplace-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(124,77,255,0.08), transparent 70%),
                  radial-gradient(ellipse at 80% 50%, rgba(255,171,0,0.06), transparent 70%);
      pointer-events: none;
    }
    .banner-content {
      position: relative;
      z-index: 1;
    }
    .banner-content > p:first-of-type {
      font-size: 1.1em;
      margin-bottom: 0.8em;
    }
    .banner-icon {
      font-size: 1.3em;
      vertical-align: middle;
      margin-right: 0.15em;
    }
    .banner-actions {
      display: flex;
      gap: 0.75em;
      flex-wrap: wrap;
    }
    .banner-actions .md-button {
      font-size: 0.85em;
      padding: 0.5em 1.3em;
    }
    /* Accent the primary button with project colors */
    .banner-actions .md-button--primary {
      background-color: #7c4dff;
      border-color: #7c4dff;
    }
    .banner-actions .md-button--primary:hover {
      background-color: #651fff;
      border-color: #651fff;
    }
    /* Subtle shimmer animation on hover */
    .marketplace-banner:hover {
      border-color: rgba(124,77,255,0.50);
      box-shadow: 0 0 24px rgba(124,77,255,0.08);
      transition: border-color 300ms ease, box-shadow 300ms ease;
    }
  </style>
{% endblock %}

{% block footer %}
  {{ super() }}
  {% if page and page.file %}
  <div style="text-align:center;padding:0.5em 0;font-size:0.72em;opacity:0.55;font-family:monospace;">
    AI agent? &rarr;
    <a href="https://codeuchain.github.io/codeupipe/agents.txt" style="opacity:0.8;">agents.txt</a>
    &nbsp;|&nbsp; plain text:
    <a href="https://codeuchain.github.io/codeupipe/{{ page.file.src_path | replace('.md', '.txt') }}" style="opacity:0.8;">{{ page.file.src_path | replace('.md', '.txt') }}</a>
  </div>
  {% endif %}
{% endblock %}
